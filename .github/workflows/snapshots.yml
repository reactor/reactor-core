name: Snapshots Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"
permissions: {}
jobs:
  run-tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        branch: [ main ]
        test-type:
          - type: core
            arguments: ":reactor-core:test --no-daemon -DuseSnapshotMicrometerVersion=true"
          - type: other # includes java21Test and java9Test for 3.6+ / java11Test for 3.7+
            arguments: "check -x :reactor-core:test -x spotlessCheck -x :reactor-core:jcstress -DuseSnapshotMicrometerVersion=true --no-daemon"
    name: Test on ${{ matrix.branch }} - ${{ matrix.test-type.type }} tests
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v5
        with:
          ref: ${{ matrix.branch }}
      - name: Setup Java 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # tag=v5
        with:
          distribution: 'temurin'
          java-version: 8
      - name: Setup Java 11
        if: contains('main 3.7.x', matrix.branch)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # tag=v5
        with:
          distribution: 'temurin'
          java-version: 11
      - name: Setup Java 25
        if: contains('main', matrix.branch)
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # tag=v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Setup Java 21
        if: contains('main 3.7.x', matrix.branch)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # tag=v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
      - name: Run Gradle Tests
        run: ./gradlew ${{ matrix.test-type.arguments }}